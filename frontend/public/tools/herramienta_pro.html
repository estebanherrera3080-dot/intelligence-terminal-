<html lang="es">
<head>

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg: #0a0e13;
      --card: #111823;
      --border: #1e2d3d;
      --accent: #00d9ff;
      --success: #00e5a0;
      --danger: #ff4d6d;
      --warning: #ffd700;
      --text: #e8edf2;
      --text-muted: #7a8a9d;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.6;
    }

    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 1.5rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-content {
      max-width: 1600px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .logo span { color: var(--accent); }

    .api-status {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.75rem;
      padding: 0.4rem 1rem;
      border-radius: 20px;
      background: rgba(0, 229, 160, 0.1);
      border: 1px solid rgba(0, 229, 160, 0.3);
      color: var(--success);
    }

    .api-status.offline {
      background: rgba(255, 77, 109, 0.1);
      border-color: rgba(255, 77, 109, 0.3);
      color: var(--danger);
    }

    main {
      max-width: 1600px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 1.2rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--accent);
    }

    /* ───────────────────────────── FORMULARIO ───────────────────────────── */

    .search-form {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: 0.4rem;
      font-weight: 600;
    }

    input, select {
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.8rem;
      border-radius: 6px;
      font-family: var(--font);
      font-size: 0.95rem;
      transition: all 0.2s;
    }

    input::placeholder { color: var(--text-muted); }
    input:focus, select:focus {
      outline: none;
      border-color: var(--accent);
      background: rgba(0, 217, 255, 0.05);
    }

    .btn {
      padding: 0.8rem 1.8rem;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.9rem;
      align-self: flex-end;
    }

    .btn-primary {
      background: var(--accent);
      color: var(--bg);
      font-weight: 700;
    }

    .btn-primary:hover {
      background: #00f0ff;
      transform: translateY(-2px);
    }

    .btn-primary:disabled {
      background: var(--text-muted);
      cursor: not-allowed;
      opacity: 0.5;
    }

    /* ───────────────────────────── RESULTADOS ───────────────────────────── */

    .loading {
      text-align: center;
      padding: 2rem;
      color: var(--accent);
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    .error-msg {
      background: rgba(255, 77, 109, 0.1);
      border: 1px solid rgba(255, 77, 109, 0.3);
      color: var(--danger);
      padding: 1rem;
      border-radius: 6px;
      margin-bottom: 1.5rem;
    }

    .prediction-section {
      margin-bottom: 2rem;
    }

    .prediction-header {
      background: linear-gradient(135deg, rgba(0,217,255,0.1), rgba(0,229,160,0.1));
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .score-box {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 2rem;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .team-score {
      text-align: center;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem;
    }

    .team-name {
      color: var(--text-muted);
      text-transform: uppercase;
      font-size: 0.9rem;
      margin-bottom: 0.8rem;
    }

    .score-large {
      font-size: 4rem;
      font-weight: 900;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 0.5rem;
    }

    .confidence-badge {
      background: rgba(255, 215, 0, 0.1);
      border: 1px solid rgba(255, 215, 0, 0.3);
      border-radius: 6px;
      padding: 0.6rem 1rem;
      font-size: 0.85rem;
      color: var(--warning);
      font-weight: 600;
      text-align: center;
    }

    .vs-separator {
      text-align: center;
    }

    .vs-text {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }

    .match-prob {
      background: rgba(0, 217, 255, 0.05);
      border: 1px solid rgba(0, 217, 255, 0.2);
      border-radius: 6px;
      padding: 1rem;
      font-size: 0.9rem;
    }

    /* ───────────────────────────── KPI GRID ───────────────────────────── */

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .kpi {
      background: rgba(0, 217, 255, 0.05);
      border: 1px solid rgba(0, 217, 255, 0.2);
      border-radius: 6px;
      padding: 1.2rem;
      text-align: center;
    }

    .kpi-value {
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--accent);
      margin-bottom: 0.4rem;
    }

    .kpi-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }

    /* ───────────────────────────── COMPARACIÓN ───────────────────────────── */

    .comparison-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .comparison-card {
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.2rem;
    }

    .comparison-title {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: var(--accent);
      text-transform: uppercase;
    }

    .stat-bar {
      margin-bottom: 1rem;
    }

    .stat-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      margin-bottom: 0.4rem;
      font-weight: 600;
    }

    .stat-bar-track {
      height: 8px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 4px;
      overflow: hidden;
    }

    .stat-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #00b8d4);
      border-radius: 4px;
    }

    /* ───────────────────────────── ÚLTIMOS 5 PARTIDOS ───────────────────────────── */

    .matches-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    .matches-table th {
      background: rgba(0, 217, 255, 0.1);
      border: 1px solid var(--border);
      padding: 0.8rem;
      text-align: left;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      font-size: 0.75rem;
    }

    .matches-table td {
      border: 1px solid var(--border);
      padding: 0.8rem;
    }

    .matches-table tr:hover {
      background: rgba(0, 217, 255, 0.05);
    }

    .match-result {
      font-weight: 700;
      color: var(--accent);
    }

    .match-win { color: var(--success); }
    .match-loss { color: var(--danger); }
    .match-draw { color: var(--warning); }

    /* ───────────────────────────── CHART ───────────────────────────── */

    .chart-container {
      position: relative;
      height: 300px;
      margin-bottom: 1.5rem;
    }

    /* ───────────────────────────── PROBABILIDADES ───────────────────────────── */

    .prob-bars {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
    }

    .prob-item {
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1rem;
      text-align: center;
    }

    .prob-percentage {
      font-size: 2.5rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
    }

    .prob-item.win .prob-percentage { color: var(--success); }
    .prob-item.draw .prob-percentage { color: var(--warning); }
    .prob-item.lose .prob-percentage { color: var(--danger); }

    .prob-label {
      font-size: 0.85rem;
      text-transform: uppercase;
      color: var(--text-muted);
      font-weight: 600;
    }

    .scenario-box {
      background: rgba(0, 0, 0, 0.2);
      border-left: 3px solid var(--accent);
      padding: 1rem;
      border-radius: 4px;
      margin-bottom: 0.8rem;
      font-size: 0.9rem;
    }

    .scenario-score {
      font-weight: 700;
      color: var(--accent);
    }

    .scenario-prob {
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    @media (max-width: 1024px) {
      .search-form { grid-template-columns: 1fr; }
      .comparison-grid { grid-template-columns: 1fr; }
      .score-box { grid-template-columns: 1fr; gap: 1rem; }
      main { padding: 1rem; }
    }
  </style>
</head>

function clamp(v, mn, mx) { return Math.max(mn, Math.min(mx, v)); }
function round(v, d = 2) { return Math.round(v * Math.pow(10, d)) / Math.pow(10, d); }

function poisson(lambda, k) {
  if (lambda <= 0) lambda = 0.001;
  let p = k * Math.log(lambda) - lambda;
  for (let i = 1; i <= k; i++) p -= Math.log(i);
  return Math.exp(p);
}

function calcXGAdvanced(team) {
  // xG avanzado considerando múltiples factores
  const baseXG = (team.sts * 0.35) + (team.chances * 0.55);
  const formBonus = team.form * 0.002; // Factor de forma
  const defenseFactor = team.defense * 0.1; // Factor defensivo
  return clamp(round(baseXG + formBonus + defenseFactor, 2), 0.1, 8);
}

function predictGoals(xg) {
  let maxProb = 0, mostLikelyGoals = 0;
  for (let k = 0; k <= 6; k++) {
    const p = poisson(xg, k);
    if (p > maxProb) { maxProb = p; mostLikelyGoals = k; }
  }
  return mostLikelyGoals;
}

function calcProbabilities(xgL, xgV) {
  let pWin = 0, pDraw = 0, pLose = 0;
  for (let l = 0; l <= 6; l++) {
    for (let v = 0; v <= 6; v++) {
      const p = poisson(xgL, l) * poisson(xgV, v);
      if (l > v) pWin += p;
      else if (l === v) pDraw += p;
      else pLose += p;
    }
  }
  const total = pWin + pDraw + pLose;
  return {
    win: round((pWin / total) * 100, 1),
    draw: round((pDraw / total) * 100, 1),
    lose: round((pLose / total) * 100, 1)
  };
}

function getTopScenarios(xgL, xgV, limit = 5) {
  const scenarios = [];
  for (let l = 0; l <= 5; l++) {
    for (let v = 0; v <= 5; v++) {
      const prob = poisson(xgL, l) * poisson(xgV, v);
      scenarios.push({ score: `${l}-${v}`, prob });
    }
  }
  return scenarios.sort((a, b) => b.prob - a.prob).slice(0, limit);
}

function calcConfidenceScore(team1, team2) {
  // Confianza basada en consistencia de forma y datos históricos
  const form1 = team1.form / 100;
  const form2 = team2.form / 100;
  const consistency = (form1 + form2) / 2;
  const dataQuality = 0.8; // Asumiendo 80% de calidad de datos
  return Math.round(consistency * dataQuality * 100);
}

function getFormVariationByDate(date) {
  // Simulación realista: algunos días son mejores que otros
  const dayOfWeek = date.getDay();
  const dayOfMonth = date.getDate();
  
  // Partidos de fin de semana suelen tener más motivación
  if (dayOfWeek === 0 || dayOfWeek === 6) {
    return 2; // +2% en fin de semana
  }
  
  // Midweek (miércoles/martes/jueves) - algo de fatiga
  if (dayOfWeek >= 2 && dayOfWeek <= 4) {
    return -1; // -1% en midweek
  }
  
  return 0;
}

function findTeamName(input) {
  const normalizedInput = input.toLowerCase().trim();
  
  // Búsqueda exacta primero
  for (const teamName in allTeams) {
    if (teamName.toLowerCase() === normalizedInput) {
      return teamName;
    }
  }
  
  // Búsqueda similar (similar spelling)
  for (const teamName in allTeams) {
    const similar = calculateSimilarity(normalizedInput, teamName.toLowerCase());
    if (similar > 0.7) {
      console.log(`✅ Match por similitud: "${input}" → "${teamName}" (${Math.round(similar * 100)}%)`);
      return teamName;
    }
  }
  
  // Búsqueda parcial - coincidencia exacta de palabra clave
  for (const teamName in allTeams) {
    const words = teamName.toLowerCase().split(' ');
    for (const word of words) {
      if (word === normalizedInput || word.startsWith(normalizedInput)) {
        return teamName;
      }
    }
    if (teamName.toLowerCase().includes(normalizedInput)) {
      return teamName;
    }
  }
  
  console.warn(`❌ Equipo no encontrado: "${input}"`);
  return null;
}

function calculateSimilarity(str1, str2) {
  const longer = str1.length > str2.length ? str1 : str2;
  const shorter = str1.length > str2.length ? str2 : str1;
  
  if (longer.length === 0) return 1.0;
  
  const editDistance = getEditDistance(longer, shorter);
  return (longer.length - editDistance) / longer.length;
}

function getEditDistance(s1, s2) {
  const costs = [];
  for (let i = 0; i <= s1.length; i++) {
    let lastValue = i;
    for (let j = 0; j <= s2.length; j++) {
      if (i === 0) {
        costs[j] = j;
      } else if (j > 0) {
        let newValue = costs[j - 1];
        if (s1.charAt(i - 1) !== s2.charAt(j - 1)) {
          newValue = Math.min(Math.min(newValue, lastValue), costs[j]) + 1;
        }
        costs[j - 1] = lastValue;
        lastValue = newValue;
      }
    }
    if (i > 0) costs[s2.length] = lastValue;
  }
  return costs[s2.length];
}

function renderProbabilityChart(team1Name, team2Name, probs) {
  const ctx = document.getElementById('probChart');
  if (!ctx) return;
  
  // Destruir gráfico anterior si existe
  if (window.probChart instanceof Chart) {
    window.probChart.destroy();
  }
  
  window.probChart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: [`${team1Name} Gana`, 'Empate', `${team2Name} Gana`],
      datasets: [{
        data: [probs.win, probs.draw, probs.lose],
        backgroundColor: [
          'rgba(0, 229, 160, 0.8)',
          'rgba(255, 215, 0, 0.8)',
          'rgba(255, 77, 109, 0.8)'
        ],
        borderColor: [
          'rgba(0, 229, 160, 1)',
          'rgba(255, 215, 0, 1)',
          'rgba(255, 77, 109, 1)'
        ],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: {
          position: 'bottom',
          labels: {
            color: '#e8edf2',
            padding: 15,
            font: { size: 12, weight: '600' }
          }
        }
      }
    }
  });
}

function renderComparisonChart(team1Name, team2Name, team1, team2) {
  const ctx = document.getElementById('comparisonChart');
  if (!ctx) return;
  
  // Destruir gráfico anterior si existe
  if (window.comparisonChart instanceof Chart) {
    window.comparisonChart.destroy();
  }
  
  // Normalizar datos para mejor visualización
  const normalize = (val, max) => (val / max * 100);
  
  window.comparisonChart = new Chart(ctx, {
    type: 'radar',
    data: {
      labels: ['Ataque', 'Defensa', 'Forma', 'Precisión', 'Oportunidades'],
      datasets: [
        {
          label: team1Name,
          data: [
            normalize(team1.goals, 3),
            100 - normalize(team1.defense, 2),
            team1.form,
            normalize(team1.sts, 12),
            normalize(team1.chances, 4)
          ],
          borderColor: 'rgba(0, 217, 255, 1)',
          backgroundColor: 'rgba(0, 217, 255, 0.15)',
          borderWidth: 2,
          pointRadius: 4,
          pointBackgroundColor: 'rgba(0, 217, 255, 0.8)'
        },
        {
          label: team2Name,
          data: [
            normalize(team2.goals, 3),
            100 - normalize(team2.defense, 2),
            team2.form,
            normalize(team2.sts, 12),
            normalize(team2.chances, 4)
          ],
          borderColor: 'rgba(255, 77, 109, 1)',
          backgroundColor: 'rgba(255, 77, 109, 0.15)',
          borderWidth: 2,
          pointRadius: 4,
          pointBackgroundColor: 'rgba(255, 77, 109, 0.8)'
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      scales: {
        r: {
          min: 0,
          max: 100,
          ticks: {
            color: '#7a8a9d',
            stepSize: 20
          },
          grid: {
            color: 'rgba(30, 45, 61, 0.5)'
          }
        }
      },
      plugins: {
        legend: {
          labels: {
            color: '#e8edf2',
            font: { size: 12, weight: '600' },
            padding: 20
          }
        }
      }
    }
  });
}

  datalist.innerHTML = '';
  
  const teamNames = Object.keys(allTeams).sort();
  teamNames.forEach(teamName => {

// SISTEMA DE HISTORIAL (localStorage)

function saveToHistory(team1, team2, matchDate) {
  try {
    let history = JSON.parse(localStorage.getItem('analysisHistory')) || [];
    const newEntry = { 
      team1, 
      team2, 
      matchDate,
      timestamp: new Date().toLocaleTimeString() 
    };
    
    // Evitar duplicados
    history = history.filter(h => !(h.team1 === team1 && h.team2 === team2 && h.matchDate === matchDate));
    
    // Agregar al inicio y limitar a 8 entradas
    history.unshift(newEntry);
    history = history.slice(0, 8);
    
    localStorage.setItem('analysisHistory', JSON.stringify(history));
    renderHistory();
  } catch (e) {
    console.warn('No se pudo guardar historial:', e);
  }
}

function renderHistory() {
  try {
    const history = JSON.parse(localStorage.getItem('analysisHistory')) || [];
    const container = document.getElementById('historyContainer');
    const section = document.getElementById('historySection');
    
    if (history.length === 0) {
      section.style.display = 'none';
      return;
    }
    
    section.style.display = 'block';
    container.innerHTML = history.map((entry, idx) => `
      <button class="history-btn" onclick="quickAnalysis('${entry.team1}', '${entry.team2}', '${entry.matchDate}')">
        ${entry.team1.substring(0, 3).toUpperCase()} vs ${entry.team2.substring(0, 3).toUpperCase()}<br><small>${entry.matchDate}</small>
      </button>
    `).join('');
  } catch (e) {
    console.warn('No se pudo renderizar historial:', e);
  }
}

function quickAnalysis(team1, team2, matchDate) {
  document.getElementById('matchDate').value = matchDate;
  document.getElementById('team1').value = team1;
  document.getElementById('team2').value = team2;
  analyzePrediction();
}

// Función para mostrar partidos sugeridos
function showSuggestedMatches() {
  const dateInput = document.getElementById('matchDate').value;
  if (!dateInput) return;
  
  const matches = getMatchesForDate(dateInput);
  const section = document.getElementById('suggestedMatchesSection');
  const container = document.getElementById('suggestedMatchesContainer');
  
  if (matches.length === 0) {
    section.style.display = 'none';
    return;
  }
  
  section.style.display = 'block';
  container.innerHTML = matches.map(m => `
    <button class="suggested-match-btn" onclick="quickFillTeams('${m.team1}', '${m.team2}')">
      ${m.team1}<br>vs<br>${m.team2}<br><small>${m.league}</small>
    </button>
  `).join('');
}

function quickFillTeams(team1, team2) {
  document.getElementById('team1').value = team1;
  document.getElementById('team2').value = team2;
  document.getElementById('team1').focus();
}
