version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: intelligence_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-intelligence_terminal}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - intelligence_network

  # TimescaleDB Extension (runs on postgres)
  timescaledb-setup:
    image: postgres:15-alpine
    container_name: intelligence_timescaledb_setup
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
    command: >
      psql -h postgres -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-intelligence_terminal}
      -c "CREATE EXTENSION IF NOT EXISTS timescaledb;"
    networks:
      - intelligence_network

  # Redis Cache
  redis:
    image: redis:7.2-alpine
    container_name: intelligence_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - intelligence_network

  # FastAPI Backend
  fastapi:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: intelligence_fastapi
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-intelligence_terminal}
      REDIS_URL: redis://redis:6379
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${DEBUG:-True}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - intelligence_network

  # Celery Worker
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: intelligence_celery_worker
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-intelligence_terminal}
      REDIS_URL: redis://redis:6379
      ENVIRONMENT: ${ENVIRONMENT:-development}
    depends_on:
      - postgres
      - redis
      - fastapi
    volumes:
      - ./backend:/app
    command: celery -A app.tasks worker --loglevel=info
    networks:
      - intelligence_network

  # Celery Beat (Scheduled Jobs)
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: intelligence_celery_beat
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-intelligence_terminal}
      REDIS_URL: redis://redis:6379
      ENVIRONMENT: ${ENVIRONMENT:-development}
    depends_on:
      - postgres
      - redis
      - fastapi
    volumes:
      - ./backend:/app
    command: celery -A app.tasks beat --loglevel=info
    networks:
      - intelligence_network

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: intelligence_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NODE_ENV: ${ENVIRONMENT:-development}
    ports:
      - "3000:3000"
    depends_on:
      - fastapi
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - intelligence_network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: intelligence_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
    depends_on:
      - fastapi
      - frontend
    networks:
      - intelligence_network

  # Prometheus (Monitoring)
  prometheus:
    image: prom/prometheus:latest
    container_name: intelligence_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      - intelligence_network

  # Grafana (Dashboards)
  grafana:
    image: grafana/grafana:latest
    container_name: intelligence_grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - intelligence_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  intelligence_network:
    driver: bridge
