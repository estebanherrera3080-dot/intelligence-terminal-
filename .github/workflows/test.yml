name: Tests & Quality Checks

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_intelligence_terminal
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7.4-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.14
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'
        cache: 'pip'
        cache-dependency-path: backend/requirements.txt

    - name: Install dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Lint with Black
      working-directory: ./backend
      run: black --check app/

    - name: Check import order
      working-directory: ./backend
      run: isort --check-only app/

    - name: Type check with mypy
      working-directory: ./backend
      run: mypy app/ || true

    - name: Run unit tests
      working-directory: ./backend
      env:
        ENVIRONMENT: testing
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_intelligence_terminal
        REDIS_URL: redis://localhost:6379/1
        JWT_SECRET_KEY: ci-test-secret-key-32-chars-min!!
      run: |
        pytest ../tests/unit/ -v --cov=app --cov-report=xml --cov-report=term-missing

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./backend/coverage.xml
        flags: unittests
        fail_ci_if_error: false

    - name: Build Docker image
      working-directory: ./backend
      run: docker build -t intelligence-terminal:latest .

  integration-test:
    runs-on: ubuntu-latest
    needs: test

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_intelligence_terminal
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7.4-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.14
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'
        cache: 'pip'
        cache-dependency-path: backend/requirements.txt

    - name: Install dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run integration tests
      working-directory: ./backend
      env:
        ENVIRONMENT: testing
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_intelligence_terminal
        REDIS_URL: redis://localhost:6379/1
        JWT_SECRET_KEY: ci-test-secret-key-32-chars-min!!
      run: pytest ../tests/integration/ -v || true

  frontend-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Type check
      working-directory: ./frontend
      run: npm run type-check || true

    - name: Lint
      working-directory: ./frontend
      run: npm run lint || true

    - name: Build
      working-directory: ./frontend
      run: npm run build
